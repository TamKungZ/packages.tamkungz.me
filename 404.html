<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO / crawler control -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="description" content="404 - The requested package or artifact was not found on TamKungZ_ Packages.">
  <meta name="theme-color" content="#03983d">
  <link rel="canonical" href="https://packages.tamkungz.me/">

  <!-- Open Graph -->
  <meta property="og:title" content="404 - TamKungZ_ Packages">
  <meta property="og:description" content="The requested package or artifact was not found.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://packages.tamkungz.me/">

  <title>404 - TamKungZ_ Packages</title>

  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #1f2937;
      --text-muted: #4b5563;
      --accent: #03983d;
      --accent-softer: #35ad64;
      --code-bg: #f3f4f6;
      --border: #e5e7eb;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      line-height: 1.6;
      padding: 24px;
    }
    main {
      max-width: 480px;
      width: 100%;
      padding: 40px 24px;
    }
    .error-icon {
      width: 200px;
      height: 200px;
      margin: 0 auto 8px;
      background-color: var(--accent);
      -webkit-mask-image: url('/resources/svg/error-404.svg');
      mask-image: url('/resources/svg/error-404.svg');
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
    }
    h1 {
      font-size: 5.5rem;
      margin: 0 0 12px 0;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 1;
    }
    p {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin: 0 0 24px 0;
    }
    .code-block {
      background: var(--code-bg);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: inline-block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.9rem;
      color: var(--text-main);
      margin-bottom: 32px;
      word-break: break-all;
    }
    code {
      font-family: inherit;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
    .action-btn {
      display: inline-block;
      padding: 12px 28px;
      background-color: var(--accent);
      color: #ffffff;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background-color 0.15s ease, transform 0.1s ease;
      box-shadow: 0 2px 4px rgba(3, 152, 61, 0.15);
    }
    .action-btn:hover {
      background-color: #027a31;
      text-decoration: none;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px rgba(3, 152, 61, 0.2);
    }
    .action-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
<main>
  <div class="error-icon" aria-hidden="true"></div>
  <h1>404</h1>
  <p>The requested package or artifact was not found.</p>

  <div class="code-block">
    Repository root: <a href="https://packages.tamkungz.me/"><code>https://packages.tamkungz.me/</code></a>
  </div>

  <div>
    <a href="https://packages.tamkungz.me/" class="action-btn">Return to Packages</a>
  </div>
</main>
</body>
</html>
